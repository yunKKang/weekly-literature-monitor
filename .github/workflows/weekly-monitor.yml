name: Weekly Literature Monitor

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Number of days to look back'
        required: false
        default: '7'
        type: string
      dry_run:
        description: 'Dry run (no Issue creation)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run weekly monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd src
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python weekly_monitor.py --days ${{ inputs.days_back || '7' }} --dry-run
          else
            python weekly_monitor.py --days ${{ inputs.days_back || '7' }}
          fi

      - name: Commit updated state
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "Weekly monitor run: $(date +%Y-%m-%d)"
            git push
          fi
